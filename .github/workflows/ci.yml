name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-latest
    env:
      # The crate's env! macros need these at compile time (scripts/build-app.sh sets the same).
      MACKFTP_BUNDLE_ID: app.mackftp.client
      MACKFTP_CONFIG_QUALIFIER: app
      MACKFTP_CONFIG_ORGANIZATION: mackftp
      MACKFTP_CONFIG_APPLICATION: client
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # Formatting gate: the tree must stay rustfmt-clean (cargo fmt is part of the build contract).
      - run: cargo fmt --all -- --check
      # Clippy runs WITHOUT -D warnings: a few known lints (large AppCtx argument lists, complex
      # types) are intentional and tracked separately. New lints still surface in the log.
      # No untrusted github.event.* input is used in any run: step (no injection surface).
      - run: cargo clippy --all-targets
      # `cargo test --lib` runs the unit tests (vault crypto roundtrip, path sanitization, FileZilla
      # import). Integration tests in tests/relay.rs need live FTP servers (tests/run-test-servers.sh)
      # and are not wired into CI yet.
      - run: cargo test --lib
      - run: cargo build --release

  # Dependency vulnerability gate. We run `cargo audit` directly (NOT the rustsec/audit-check
  # action — it has no way to disable failing on unmaintained/unsound *warnings*, of which there
  # are ~16 mostly-Linux-only transitive deps via Slint's winit backends). cargo-audit's own
  # exit code drives pass/fail: non-zero ONLY on real vulnerabilities (after the ignores), zero
  # on informational warnings. See SECURITY.md for the full classification.
  #
  # Three advisories are ignored (documented + accepted):
  #   RUSTSEC-2023-0071 — rsa "Marvin Attack" (transitive via russh). No upstream fix; macOS-runtime
  #                       but low exploitability for a GUI client. Prefer ed25519 host keys.
  #   RUSTSEC-2026-0194 — quick-xml duplicated-attribute quadratic (HIGH). Linux-only: pulled by
  #                       Slint's winit wayland-scanner, NOT compiled into the macOS binary
  #                       (cargo tree -i quick-xml --target aarch64-apple-darwin => nothing).
  #   RUSTSEC-2026-0195 — quick-xml memory-exhaustion DoS (HIGH). Same Linux-only path as above.
  # Every other advisory fails the gate.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

