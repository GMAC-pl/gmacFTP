name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: macos-latest
    env:
      # The crate's env! macros need these at compile time (scripts/build-app.sh sets the same).
      MACKFTP_BUNDLE_ID: app.mackftp.client
      MACKFTP_CONFIG_QUALIFIER: app
      MACKFTP_CONFIG_ORGANIZATION: mackftp
      MACKFTP_CONFIG_APPLICATION: client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, 2026-07-10
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Formatting gate: the tree must stay rustfmt-clean (cargo fmt is part of the build contract).
      - run: cargo fmt --all -- --check
      # Warnings are regressions in the quality gate. Intentional wide controller signatures are
      # explicitly allowed at module scope, so this must remain warning-free.
      # No untrusted github.event.* input is used in any run: step (no injection surface).
      - run: cargo clippy --all-targets -- -D warnings
      # Run unit, integration and example targets. Tests that need an explicitly configured
      # external server skip safely when that server is absent.
      - run: cargo test --all-targets
      # Both public release architectures must compile on every change. The release script joins
      # these exact outputs with lipo and verifies the resulting universal binary before signing.
      - run: cargo build --release --locked --target aarch64-apple-darwin
      - run: cargo build --release --locked --target x86_64-apple-darwin
      - run: |
          lipo -create \
            target/aarch64-apple-darwin/release/gmacftp \
            target/x86_64-apple-darwin/release/gmacftp \
            -output /tmp/gmacftp-universal
          test "$(lipo -archs /tmp/gmacftp-universal)" = "x86_64 arm64" || \
            test "$(lipo -archs /tmp/gmacftp-universal)" = "arm64 x86_64"
      - run: bash -n scripts/build-app.sh scripts/build-dmg.sh

  # Dependency vulnerability gate. We run `cargo audit` directly (NOT the rustsec/audit-check
  # action — it has no way to disable failing on unmaintained/unsound *warnings*, of which there
  # are currently 14 mostly-Linux-only transitive deps via Slint's winit backends). cargo-audit's own
  # exit code drives pass/fail: non-zero ONLY on real vulnerabilities (after the ignores), zero
  # on informational warnings. See SECURITY.md for the full classification.
  #
  # Three advisories are ignored (documented + accepted):
  #   RUSTSEC-2023-0071 — rsa "Marvin Attack" (transitive via russh). No upstream fix. gmacFTP
  #                       rejects built-in RSA private keys before authentication, so this crate
  #                       performs no remotely observable RSA private operation. RSA through SSH
  #                       Agent delegates signing to the system agent; host-key use is public-only.
  #   RUSTSEC-2026-0194 — quick-xml duplicated-attribute quadratic (HIGH). Linux-only: pulled by
  #                       Slint's winit wayland-scanner, NOT compiled into the macOS binary
  #                       (cargo tree -i quick-xml --target aarch64-apple-darwin => nothing).
  #   RUSTSEC-2026-0195 — quick-xml memory-exhaustion DoS (HIGH). Same Linux-only path as above.
  # Every other advisory fails the gate.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-audit
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
